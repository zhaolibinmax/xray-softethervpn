
load_module modules/ngx_http_geoip2_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;

    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        auto_reload 5m;
        $geoip2_country_code country iso_code;
    }
    map $geoip2_country_code $allowed_country {
        default  yes;
        CN      no;
    }
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;
    set_real_ip_from 2c0f:f248::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 173.245.48.0/20;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;
    ssl_buffer_size 4k;
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_ecdh_curve auto;
    tcp_nopush on;
    tcp_nodelay on;
    resolver 1.1.1.1 8.8.8.8 [2606:4700:4700::1111] valid=300s;
    resolver_timeout 5s;

    fastcgi_intercept_errors on;
    error_page 403 /403.html;

    server {
        listen 80;
        listen [::]:80;
        server_name xxxxx;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
        return 444;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        server_name xxxxx;
        http2 on;
        http3 on;
        quic_gso on;
        ssl_certificate /etc/nginx/fullchain.pem;
        ssl_certificate_key /etc/nginx/privkey.pem;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        location = /403.html {
            root /var/www/html;
            internal;
            ssi on;
            }

        location /xhttp3 {
            grpc_pass grpc://127.0.0.1:11111;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header TE trailers;
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_connect_timeout 10s;
        }

        proxy_buffering off;
        proxy_cache off;
        location / {
            proxy_pass http://127.0.0.1:56789;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
#            root /var/www/html;
#            index index.html;

#            if ($allowed_country = no) {
#            return 403;
#            }
        }

        location /download/ {
            alias /download/;
            try_files $uri =404;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;

            allow 127.0.0.1;
            allow ::1;
            deny all;

            location ~* \.(php|jsp|asp|sh|cgi)$ {
            deny all;
            }
        }
    }
}
